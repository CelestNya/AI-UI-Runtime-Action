name: Feature Request
description: Propose a new capability or product direction.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or missing workflow are you trying to solve?
      placeholder: Describe the real workflow gap.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the product do?
      placeholder: Describe the expected interaction, output, or architecture change.
    validations:
      required: true

  - type: textarea
    id: user-value
    attributes:
      label: User Value
      description: Why does this matter for AI-assisted UI editing?
      placeholder: Explain the expected benefit.

  - type: textarea
    id: scope
    attributes:
      label: Scope Notes
      description: Optional constraints, tradeoffs, or non-goals.
      placeholder: Mention browser constraints, framework assumptions, or rollout boundaries.
