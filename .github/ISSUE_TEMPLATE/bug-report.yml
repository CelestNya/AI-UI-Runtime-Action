name: Bug Report
description: Report a reproducible bug in the demo app, extension, or runtime flow.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: How can we reproduce the problem?
      placeholder: |
        1. Open ...
        2. Enable debug ...
        3. Select ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and project version.
      placeholder: Chrome 134 / Windows 11 / main

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste intent JSON, console errors, or add screenshots/GIFs if available.
